extends: default

rules:
  line-length:
    max: 120
    ignore: |
      mkdocs.yml
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: true
  quoted-strings:
    quote-type: double
    required: false
